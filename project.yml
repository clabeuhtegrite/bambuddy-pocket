name: BamPocket
options:
  bundleIdPrefix: com.bampocket
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
    GCC_TREAT_WARNINGS_AS_ERRORS: "NO"

packages:
  BambuddyPocketKit:
    path: Packages/BambuddyPocketKit

targets:
  BamPocket:
    type: application
    platform: iOS
    sources:
      - path: BambuddyPocket
    dependencies:
      - package: BambuddyPocketKit
        product: BambuddyPocketDomain
      - package: BambuddyPocketKit
        product: BambuddyPocketNetworking
      - package: BambuddyPocketKit
        product: BambuddyPocketDesignSystem
    info:
      path: BambuddyPocket/Info.plist
      properties:
        CFBundleDisplayName: BamPocket
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Police Inter (TTF variable, OFL — cf. NOTICE). Direction artistique BamPocket.
        UIAppFonts:
          - Inter-Variable.ttf
        # Launch screen : logo centré (pastille verte « B ») sur fond sombre de marque.
        UILaunchScreen:
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
          UIColorName: LaunchBackground
        ITSAppUsesNonExemptEncryption: false
        # Accès au réseau local (cf. ADR-0003) : l'app se connecte directement aux IP/hôtes
        # saisis par l'utilisateur (REST + WebSocket + flux caméra MJPEG). Déclenche l'invite
        # « réseau local » sur device réel. Pas de Bonjour/mDNS côté app (la découverte SSDP est
        # effectuée par le serveur Bambuddy, pas par l'iPhone) → pas de NSBonjourServices. Pas
        # d'usage de l'appareil photo de l'iPhone (la « caméra » est le flux réseau de
        # l'imprimante) → pas de NSCameraUsageDescription.
        NSLocalNetworkUsageDescription: >-
          BamPocket se connecte à vos serveurs Bambuddy et imprimantes sur votre réseau
          local pour afficher leur état et les piloter.
        # ATS : HTTPS par défaut, exception limitée pour le HTTP sur adresses locales/privées.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bampocket.app
        # PRODUCT_NAME = nom de la cible (BamPocket). Le nom affiché est CFBundleDisplayName.
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic

  BamPocketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BambuddyPocketTests
    # Le bundle de tests s'héberge dans l'app (test host) et récupère les frameworks
    # SPM (Domain/Networking) **via l'app** — il ne les relie PAS lui-même. Relier les
    # produits statiques à la fois dans l'app ET dans le bundle de tests dupliquait les
    # classes Objective-C (« objc duplicate class »), source de crashs aléatoires en CI.
    # Les `@testable import` restent valides car les modules sont liés (testable) par l'hôte.
    dependencies:
      - target: BamPocket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bampocket.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

  BamPocketUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BambuddyPocketUITests
    dependencies:
      - target: BamPocket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bampocket.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  BamPocket:
    build:
      targets:
        BamPocket: all
        BamPocketTests: [test]
        BamPocketUITests: [test]
    test:
      gatherCoverageData: true
      # Tests unitaires + parcours critiques XCUITest (déterministes, sans backend).
      # Les captures (ScreenshotTests) se skippent d'elles-mêmes hors UITEST_LIVE=1.
      targets:
        - BamPocketTests
        - BamPocketUITests
    run:
      config: Debug
    profile:
      config: Release

  # Scheme dédié aux captures : exécute les tests UI avec un backend live (Docker).
  BamPocketScreenshots:
    build:
      targets:
        BamPocket: all
        BamPocketUITests: [test]
    test:
      targets:
        - BamPocketUITests
      environmentVariables:
        UITEST_LIVE: "1"
    run:
      config: Debug
