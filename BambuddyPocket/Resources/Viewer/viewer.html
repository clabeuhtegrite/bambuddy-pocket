<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1c1c1e; }
    #c { width: 100%; height: 100%; display: block; touch-action: none; }
    #err { position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
           text-align: center; color: #9b9b9f; font: 15px -apple-system, sans-serif; display: none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="err">Aperçu 3D indisponible</div>
  <script src="three.min.js"></script>
  <script src="fflate.min.js"></script>
  <script src="OrbitControls.js"></script>
  <script src="STLLoader.js"></script>
  <script src="3MFLoader.js"></script>
  <script>
    // window.__MODEL_B64 / window.__MODEL_EXT sont injectés par l'app (WKUserScript, documentStart).
    (function () {
      function showError() { document.getElementById('err').style.display = 'block'; }
      try {
        var canvas = document.getElementById('c');
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        function size() { return { w: window.innerWidth, h: window.innerHeight }; }
        var s = size();
        renderer.setSize(s.w, s.h, false);

        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1c1c1e);
        var camera = new THREE.PerspectiveCamera(45, s.w / s.h, 0.1, 10000);
        camera.position.set(150, 150, 150);

        var controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.65));
        var key = new THREE.DirectionalLight(0xffffff, 0.85);
        key.position.set(1, 1.5, 1);
        scene.add(key);
        scene.add(new THREE.GridHelper(256, 16, 0x3a3a3c, 0x2c2c2e));

        function toBuffer(b64) {
          var bin = atob(b64), len = bin.length, bytes = new Uint8Array(len);
          for (var i = 0; i < len; i++) { bytes[i] = bin.charCodeAt(i); }
          return bytes.buffer;
        }

        function frame(obj) {
          var box = new THREE.Box3().setFromObject(obj);
          var sz = box.getSize(new THREE.Vector3());
          var ctr = box.getCenter(new THREE.Vector3());
          obj.position.sub(ctr);
          var maxDim = Math.max(sz.x, sz.y, sz.z) || 100;
          camera.position.set(maxDim * 1.2, maxDim * 1.2, maxDim * 1.2);
          camera.near = maxDim / 100;
          camera.far = maxDim * 100;
          camera.updateProjectionMatrix();
          controls.target.set(0, 0, 0);
          controls.update();
        }

        // Parse minimal du G-code → segments de ligne. Trace en priorité les déplacements
        // d'**extrusion** (G0/G1 avec E croissant) en vert ; si le fichier ne contient aucune
        // extrusion (G-code de déplacement seul), on retombe sur les déplacements G0/G1 pour
        // afficher tout de même un tracé. Tolère G90/G91 (absolu/relatif) et M82/M83 (E abs/rel).
        // Accepte un ArrayBuffer/Uint8Array **ou** une chaîne déjà décodée.
        function gcodeToObject(input) {
          var text = (typeof input === 'string')
            ? input
            : new TextDecoder('utf-8').decode(new Uint8Array(input));
          var lines = text.split('\n');
          var extrude = [];
          var travel = [];
          var x = 0, y = 0, z = 0, e = 0;
          var absolute = true, absoluteE = true;
          var px = 0, py = 0, pz = 0;
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            var semi = line.indexOf(';');
            if (semi >= 0) { line = line.slice(0, semi); }
            line = line.trim();
            if (!line) { continue; }
            var parts = line.split(/\s+/);
            var cmd = parts[0].toUpperCase();
            if (cmd === 'G90') { absolute = true; absoluteE = true; continue; }
            if (cmd === 'G91') { absolute = false; absoluteE = false; continue; }
            if (cmd === 'M82') { absoluteE = true; continue; }
            if (cmd === 'M83') { absoluteE = false; continue; }
            if (cmd !== 'G0' && cmd !== 'G1') { continue; }
            var nx = x, ny = y, nz = z, ne = e, hasE = false, moved = false;
            for (var p = 1; p < parts.length; p++) {
              var tok = parts[p], axis = tok[0].toUpperCase(), val = parseFloat(tok.slice(1));
              if (isNaN(val)) { continue; }
              if (axis === 'X') { nx = absolute ? val : x + val; moved = true; }
              else if (axis === 'Y') { ny = absolute ? val : y + val; moved = true; }
              else if (axis === 'Z') { nz = absolute ? val : z + val; moved = true; }
              else if (axis === 'E') { ne = absoluteE ? val : e + val; hasE = true; }
            }
            // Three.js Y-up : on mappe Z imprimante → Y, Y imprimante → Z.
            if (hasE && ne > e + 1e-4) {
              extrude.push(px, pz, py, nx, nz, ny);
            } else if (moved) {
              travel.push(px, pz, py, nx, nz, ny);
            }
            x = nx; y = ny; z = nz; e = ne; px = nx; py = ny; pz = nz;
          }
          // Préfère les tracés d'extrusion (vert). À défaut, montre les déplacements (gris).
          var positions = extrude.length ? extrude : travel;
          var color = extrude.length ? 0x00ae42 : 0x6e6e73;
          if (positions.length === 0) { throw new Error('no toolpath'); }
          var g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
          return new THREE.LineSegments(g, new THREE.LineBasicMaterial({ color: color }));
        }

        // Une archive Bambu **slicée** est un conteneur 3MF (zip) dont la géométrie utile vit dans
        // `Metadata/plate_*.gcode` ; le `3D/3dmodel.model` est souvent vide (→ maillage vide → grille
        // seule). On extrait donc ce G-code via fflate (bundlé) pour le rendre en tracés d'outil.
        // Renvoie la chaîne G-code de la première plaque, ou `null` si le 3MF n'est pas slicé.
        function extractPlateGcode(buffer) {
          if (typeof fflate === 'undefined' || !fflate.unzipSync) { return null; }
          var files;
          try {
            files = fflate.unzipSync(new Uint8Array(buffer));
          } catch (e) {
            return null;
          }
          var names = Object.keys(files);
          var plate = null;
          for (var i = 0; i < names.length; i++) {
            var n = names[i];
            // Insensible à la casse / au séparateur ; cible `Metadata/plate_<n>.gcode`.
            if (/(^|\/)metadata\/plate_\d+\.gcode$/i.test(n.replace(/\\/g, '/'))) {
              // Privilégie la première plaque dans l'ordre naturel des noms.
              if (plate === null || n < plate) { plate = n; }
            }
          }
          if (plate === null) { return null; }
          return fflate.strFromU8(files[plate]);
        }

        var ext = window.__MODEL_EXT;
        var buf = toBuffer(window.__MODEL_B64);
        var obj;
        if (ext === 'stl') {
          var geo = new THREE.STLLoader().parse(buf);
          geo.computeVertexNormals();
          var mat = new THREE.MeshPhongMaterial({ color: 0x00a3ad, specular: 0x222222, shininess: 40 });
          obj = new THREE.Mesh(geo, mat);
        } else if (ext === '3mf') {
          // Détection robuste (pas seulement l'extension) : un `.3mf` contenant un
          // `Metadata/plate_*.gcode` est une archive slicée → on rend le G-code. Sinon maillage.
          var sliced = extractPlateGcode(buf);
          if (sliced !== null) {
            obj = gcodeToObject(sliced);
          } else {
            obj = new THREE.ThreeMFLoader().parse(buf);
          }
        } else if (ext === 'gcode') {
          obj = gcodeToObject(buf);
        } else {
          throw new Error('unsupported');
        }
        scene.add(obj);
        frame(obj);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', function () {
          var r = size();
          camera.aspect = r.w / r.h;
          camera.updateProjectionMatrix();
          renderer.setSize(r.w, r.h, false);
        });
      } catch (e) {
        showError();
      }
    })();
  </script>
</body>
</html>
