name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (SwiftLint / SwiftFormat)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftFormat (lint mode)
        run: |
          if find . -path ./Packages/.build -prune -o -name '*.swift' -print | grep -q .; then
            swiftformat --lint .
          else
            echo "Pas encore de fichiers Swift — étape ignorée."
          fi
      - name: SwiftLint (strict)
        run: |
          if find . -path ./Packages/.build -prune -o -name '*.swift' -print | grep -q .; then
            swiftlint --strict
          else
            echo "Pas encore de fichiers Swift — étape ignorée."
          fi

  build-test:
    name: Build & tests (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Pick an available iPhone simulator
        id: sim
        run: |
          set -euo pipefail
          NAME=$(xcrun simctl list devices available | grep -E 'iPhone' | head -1 | sed -E 's/ \(.*//' | xargs)
          if [ -z "$NAME" ]; then echo "Aucun simulateur iPhone disponible" >&2; exit 1; fi
          echo "Simulateur : $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: Build & test (app)
        run: |
          set -euo pipefail
          xcodebuild \
            -project BamPocket.xcodeproj \
            -scheme BamPocket \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO \
            clean test
      - name: Test SPM package (swift test)
        run: |
          cd Packages/BambuddyPocketKit && swift test

  shellcheck:
    name: Shellcheck (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          if find scripts -name '*.sh' | grep -q .; then
            find scripts -name '*.sh' -print0 | xargs -0 shellcheck
          else
            echo "Aucun script shell — étape ignorée."
          fi
